<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timestamp Converter</title>
<style>
body {font-family: Arial; margin:20px; background:#f4f6f9;}
textarea {width:100%; height:250px; font-family:Consolas, monospace; padding:10px; box-sizing:border-box;}
button {padding:10px 15px; margin:5px; cursor:pointer;}
#dropZone {
    border:2px dashed #666; padding:20px; text-align:center;
    background:white; margin:15px 0;
}
#dropZone.dragover {background:#dff0ff;}
</style>
</head>
<body>

<h2>Timestamp Converter</h2>

<div id="dropZone">
    Kéo thả file (.txt, .md, .srt) vào đây hoặc
    <input type="file" id="fileInput" accept=".txt,.md,.srt">
</div>

<h3>Input</h3>
<textarea id="input"></textarea>

<div>
<button onclick="convertToTemplate()">Chuyển về mẫu 3 cột</button>
<button onclick="removeTimestamp()">Xóa timestamp</button>
<button onclick="convertToSRT()">Xuất SRT</button>
<button onclick="copyOutput()">Copy Output</button>
<button onclick="downloadFile()">Download</button>
</div>

<h3>Output</h3>
<textarea id="output"></textarea>

<script>
let currentExt="md";

function detectFormat(text){
    if(/\[\d{2}:\d{2}:\d{2}\]/.test(text)) return "bracket";
    if(/^\d+\s*[\r\n]+\d{2}:\d{2}:\d{2},\d{3}/m.test(text)) return "srt";
    if(/^\d+\.\d+\s+\d+\.\d+\s+/m.test(text)) return "template";
    return "unknown";
}

function parseInput(){
    const text=document.getElementById("input").value;
    const format=detectFormat(text);
    const entries=[];

    if(format==="bracket"){
        text.split(/\r?\n/).forEach(line=>{
            const m=line.match(/\[(\d{2}):(\d{2}):(\d{2})\]\s*(.+)/);
            if(m){
                entries.push({
                    start:+m[1]*60 + +m[2] + +m[3]/100,
                    text:m[4]
                });
            }
        });
    }

    else if(format==="template"){
        text.split(/\r?\n/).forEach(line=>{
            const m=line.match(/^(\d+\.\d+)\s+(\d+\.\d+)\s+(.+)$/);
            if(m){
                entries.push({
                    start:parseFloat(m[1]),
                    end:parseFloat(m[2]),
                    text:m[3]
                });
            }
        });
    }

    else if(format==="srt"){
        const blocks=text.split(/\n\s*\n/);

        blocks.forEach(block=>{
            const lines=block.trim().split(/\r?\n/);
            if(lines.length>=3){
                const time=lines[1].match(
                    /(\d{2}):(\d{2}):(\d{2}),(\d{3})\s+-->\s+(\d{2}):(\d{2}):(\d{2}),(\d{3})/
                );

                if(time){
                    const start=
                        +time[1]*3600+
                        +time[2]*60+
                        +time[3]+
                        +time[4]/1000;

                    const end=
                        +time[5]*3600+
                        +time[6]*60+
                        +time[7]+
                        +time[8]/1000;

                    entries.push({
                        start:start,
                        end:end,
                        text:lines.slice(2).join(" ")
                    });
                }
            }
        });
    }

    return entries;
}

function convertToTemplate(){
    const entries=parseInput();
    let out="";

    entries.forEach((e,i)=>{
        let end=e.end;

        if(end===undefined){
            end=(i<entries.length-1)
                ? entries[i+1].start
                : e.start+3;
        }

        out += e.start.toFixed(6)+"\t"+
               end.toFixed(6)+"\t"+
               e.text+"\n";
    });

    output.value=out;
    currentExt="md";
}

function removeTimestamp(){
    output.value=parseInput().map(e=>e.text).join("\n");
    currentExt="md";
}

function secToSRT(sec){
    let ms=Math.round(sec*1000);

    let h=Math.floor(ms/3600000); ms%=3600000;
    let m=Math.floor(ms/60000); ms%=60000;
    let s=Math.floor(ms/1000);
    ms%=1000;

    return String(h).padStart(2,"0")+":"+
           String(m).padStart(2,"0")+":"+
           String(s).padStart(2,"0")+","+
           String(ms).padStart(3,"0");
}

function convertToSRT(){
    const entries=parseInput();
    let out="";

    entries.forEach((e,i)=>{
        let end=e.end;

        if(end===undefined){
            end=(i<entries.length-1)
                ? entries[i+1].start
                : e.start+3;
        }

        out += (i+1)+"\n"+
               secToSRT(e.start)+" --> "+
               secToSRT(end)+"\n"+
               e.text+"\n\n";
    });

    output.value=out;
    currentExt="srt";
}

function copyOutput(){
    output.select();
    document.execCommand("copy");
    alert("Đã copy");
}

function downloadFile(){
    const blob=new Blob([output.value],{type:"text/plain"});
    const a=document.createElement("a");

    a.href=URL.createObjectURL(blob);
    a.download="output."+currentExt;
    a.click();

    URL.revokeObjectURL(a.href);
}

fileInput.addEventListener("change", e=>{
    const file=e.target.files[0];
    if(file){
        const reader=new FileReader();
        reader.onload=()=>input.value=reader.result;
        reader.readAsText(file);
    }
});

dropZone.addEventListener("dragover", e=>{
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", ()=>{
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", e=>{
    e.preventDefault();
    dropZone.classList.remove("dragover");

    const file=e.dataTransfer.files[0];

    if(file){
        const reader=new FileReader();
        reader.onload=()=>input.value=reader.result;
        reader.readAsText(file);
    }
});
</script>

</body>
</html>
